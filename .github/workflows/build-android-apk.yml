name: Build Riuka AI APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'constants/**'
      - 'package.json'
      - 'app.json'
      - 'eas.json'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK download URL
        run: |
          URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive 2>/dev/null \
            | python3 -c "import json,sys; b=json.load(sys.stdin); print(b[0]['artifacts']['buildUrl'])" 2>/dev/null || echo "")
          if [ -n "$URL" ]; then
            echo "✅ APK ready: $URL"
            echo "APK_URL=$URL" >> $GITHUB_ENV
            curl -L "$URL" -o riuka-ai.apk
          else
            echo "Build URL not found — check EAS dashboard at https://expo.dev"
          fi

      - name: Upload APK artifact
        if: env.APK_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: riuka-ai-v${{ github.run_number }}.apk
          path: riuka-ai.apk
          retention-days: 30
