name: Build Riuka AI APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'constants/**'
      - 'package.json'
      - 'app.json'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Generate signing keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/release.keystore \
            -storepass riukaai -alias riukaai -keypass riukaai \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Riuka AI,O=Riuka,C=US"

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m" \
            -Pandroid.injected.signing.store.file=$HOME/.android/release.keystore \
            -Pandroid.injected.signing.store.password=riukaai \
            -Pandroid.injected.signing.key.alias=riukaai \
            -Pandroid.injected.signing.key.password=riukaai

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: riuka-ai-v${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
