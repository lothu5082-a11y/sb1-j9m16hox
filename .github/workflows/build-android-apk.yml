name: Build Vexsora APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/vexsora-offline-ai-app-Up0OV
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'constants/**'
      - 'android/**'
      - 'package.json'
      - 'app.json'
      - 'babel.config.js'
      - 'react-native.config.js'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Print Android environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "Available NDK versions:"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "  none pre-installed"
          echo "CMake:"
          cmake --version 2>/dev/null || echo "  cmake not on PATH"
          echo "Available cmake in SDK:"
          ls $ANDROID_HOME/cmake/ 2>/dev/null || echo "  none"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Install NDK 27.1.12297006
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          fi
          if [ -f "$SDKMANAGER" ]; then
            echo "y" | "$SDKMANAGER" "ndk;27.1.12297006"
          else
            echo "sdkmanager not found, checking if NDK already present"
            ls "$ANDROID_HOME/ndk/" 2>/dev/null || echo "no NDK at all"
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # android/ scaffold (with MainApplication registered + manifest patched) is
      # fully committed to the repo — no expo prebuild step needed in CI.

      # ── Generate release keystore ────────────────────────────────────────────
      - name: Generate signing keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/vexsora-release.keystore \
            -storepass vexsora2024 \
            -alias vexsora \
            -keypass vexsora2024 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Vexsora AI,O=Vexsora,C=US"

      # ── Build release APK ────────────────────────────────────────────────────
      - name: Build release APK
        id: build_apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pandroid.injected.signing.store.file=$HOME/.android/vexsora-release.keystore \
            -Pandroid.injected.signing.store.password=vexsora2024 \
            -Pandroid.injected.signing.key.alias=vexsora \
            -Pandroid.injected.signing.key.password=vexsora2024 \
            2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== LAST 200 LINES OF BUILD LOG ==="
            tail -200 /tmp/gradle-build.log
            exit $BUILD_EXIT
          fi
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          ANDROID_HOME: /usr/local/lib/android/sdk

      # ── Upload APK artifact ──────────────────────────────────────────────────
      - name: Upload Vexsora APK
        uses: actions/upload-artifact@v4
        with:
          name: Vexsora-v${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log-v${{ github.run_number }}.txt
          path: /tmp/gradle-build.log
          retention-days: 7

      - name: APK build summary
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ Vexsora APK built — $SIZE"
          else
            echo "❌ APK not found"
            exit 1
          fi
