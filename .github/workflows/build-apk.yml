name: Build Vexora AI APK

on:
  push:
    branches:
      - claude/vexora-ai-overview-cMaQ1
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components and NDK
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"

          # Accept all licenses first
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true

          # Install required SDK components
          echo "Installing Android SDK platform 36 and build-tools 36.0.0..."
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 || true

          # Install CMake 3.30.5 — required by React Native 0.81 New Architecture
          echo "Installing CMake 3.30.5..."
          "$SDKMANAGER" "cmake;3.30.5" 2>&1 || true

          echo "Available NDK versions before NDK install:"
          ls "${ANDROID_SDK_ROOT}/ndk/" 2>/dev/null || echo "  (none yet)"

          # Try to install the exact NDK version RN 0.81 needs
          echo "Installing NDK 27.1.12297006..."
          "$SDKMANAGER" "ndk;27.1.12297006" 2>&1 || true

          echo "Available NDK versions after install:"
          ls "${ANDROID_SDK_ROOT}/ndk/" 2>/dev/null || echo "  (none)"

          # Pick the best NDK 27.x available (exact match preferred, then latest 27.x)
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/27.1.12297006"
          if [ ! -d "$NDK_PATH" ]; then
            FALLBACK=$(ls -d "${ANDROID_SDK_ROOT}/ndk/27."* 2>/dev/null | sort -V | tail -1)
            NDK_PATH="${FALLBACK}"
          fi

          if [ -d "$NDK_PATH" ]; then
            NDK_VER=$(basename "$NDK_PATH")
            echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
            echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
            echo "SELECTED_NDK_VERSION=$NDK_VER" >> $GITHUB_ENV
            echo "Using NDK: $NDK_PATH"
          else
            echo "ERROR: No NDK 27.x found — build will fail"
            exit 1
          fi

          # Show installed CMake versions
          echo "Installed CMake versions:"
          ls "${ANDROID_SDK_ROOT}/cmake/" 2>/dev/null || echo "  (none in SDK cmake dir)"

      - name: Install dependencies
        run: npm ci

      - name: Run Expo prebuild (generate native Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch NDK version and CI optimizations
        run: |
          NEEDED="27.1.12297006"
          SELECTED="${SELECTED_NDK_VERSION}"
          echo "Required NDK: $NEEDED  |  Available NDK: $SELECTED"

          if [ "$SELECTED" != "$NEEDED" ]; then
            echo "Patching all NDK version references from $NEEDED → $SELECTED"
            # 1. Patch app/build.gradle (used by the app module itself)
            sed -i "s/ndkVersion rootProject.ext.ndkVersion/ndkVersion \"${SELECTED}\"/" android/app/build.gradle
            echo "android/app/build.gradle ndkVersion:"
            grep "ndkVersion" android/app/build.gradle

            # 2. Patch react-native's libs.versions.toml — root source that
            #    ExpoRootProjectPlugin reads to set rootProject.ext.ndkVersion,
            #    which ALL autolinked native modules inherit.
            TOML="node_modules/react-native/gradle/libs.versions.toml"
            sed -i "s/ndkVersion = \"${NEEDED}\"/ndkVersion = \"${SELECTED}\"/" "$TOML"
            echo "Patched $TOML:"
            grep "ndkVersion" "$TOML"
          else
            echo "NDK $NEEDED is available — no NDK patches needed"
          fi

          # CI optimisation: build arm64-v8a only (covers all modern Android phones)
          # Avoids compiling 4× native code which saves ~15 min and reduces OOM risk
          echo "Patching gradle.properties: limit to arm64-v8a only for CI..."
          sed -i "s/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/" android/gradle.properties
          echo "reactNativeArchitectures after patch:"
          grep "reactNativeArchitectures" android/gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Pre-bundle JS (isolate Metro from Gradle)
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/
        env:
          EXPO_NO_TELEMETRY: 1
          NODE_ENV: production

      - name: Build debug APK
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log || {
            echo ""
            echo "====== GRADLE FAILURE SUMMARY ======"
            grep -A 15 "What went wrong" /tmp/gradle.log | head -60
            echo "------"
            echo "Last 40 lines of Gradle log:"
            tail -40 /tmp/gradle.log
            echo "======================================"
            exit 1
          }
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'
          EXPO_NO_TELEMETRY: 1
          CMAKE_VERSION: '3.30.5'

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Rename APK
        run: |
          cp "${{ steps.find_apk.outputs.apk_path }}" vexora-ai-debug.apk
          echo "APK size: $(ls -lh vexora-ai-debug.apk | awk '{print $5}')"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vexora-ai-apk
          path: vexora-ai-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Vexora AI — Build ${{ github.run_number }}"
          body: |
            ## Vexora AI Debug Build

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`

            ### Install on Android
            1. Download `vexora-ai-debug.apk` below
            2. Open it on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Install and launch Vexora AI

            > This is a debug build for testing. Production builds will be signed.
          files: vexora-ai-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
